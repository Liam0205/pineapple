name: Nightly Differential Fuzz

on:
  schedule:
    - cron: "0 14 * * *"  # 22:00 UTC+8
  workflow_dispatch:
    inputs:
      rounds:
        description: "Number of fuzz rounds"
        default: "10000"
      stability-runs:
        description: "Stability check reruns per case"
        default: "3"

jobs:
  differential-fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: pine-go/go.mod
          cache-dependency-path: pine-go/go.sum

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install C++ build deps
        run: |
          timeout 300 sudo apt-get update
          timeout 300 sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++-13 libluajit-5.1-dev libcurl4-openssl-dev

      - name: Build Go binary
        run: go build -o pineapple-run ./cmd/pineapple-run/
        working-directory: pine-go

      - name: Install Python engine
        run: pip install -e ".[dev]"
        working-directory: pine-python

      - name: Build Java engine
        run: mvn package -B -q -DskipTests
        working-directory: pine-java

      - name: Build C++ engine
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++-13
          cmake --build build --target pineapple-run
        working-directory: pine-cpp

      - name: Run differential fuzz
        timeout-minutes: 355
        run: |
          set -o pipefail
          # Weekend (Saturday UTC) gets 100k rounds + shrink for deeper coverage;
          # weekdays get 10k. Manual dispatch uses the input value as-is.
          if [ -n "${{ inputs.rounds }}" ]; then
            ROUNDS="${{ inputs.rounds }}"
            EXTRA_FLAGS=""
          elif [ "$(date -u +%u)" = "6" ]; then
            ROUNDS=100000
            EXTRA_FLAGS="--shrink"
          else
            ROUNDS=10000
            EXTRA_FLAGS=""
          fi
          # Use shell timeout (350m) so the step exits with code 124 on
          # timeout instead of being cancelled — allows subsequent steps
          # (evaluate, issue creation) to run normally. The step-level
          # timeout-minutes: 355 remains as a safety net.
          timeout 350m python3 scripts/differential-fuzz.py \
            --rounds "$ROUNDS" \
            --stability-runs ${{ inputs.stability-runs || '3' }} \
            --go-bin pine-go/pineapple-run \
            --cpp-bin pine-cpp/build/pineapple-run \
            --engines go,python,java,cpp \
            --save-dir /tmp/diff-fuzz-nightly \
            $EXTRA_FLAGS \
            2>&1 | tee diff-fuzz-output.log
          echo ${PIPESTATUS[0]} > /tmp/fuzz-exit-code

      - name: Evaluate results
        if: always()
        id: evaluate
        run: |
          echo "### Final Status" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          tail -30 diff-fuzz-output.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          FAIL_COUNT=$(grep -oP 'FAIL: \K[0-9]+' diff-fuzz-output.log | tail -1 || echo "0")
          UNSTABLE_COUNT=$(grep -oP 'UNSTABLE: \K[0-9]+' diff-fuzz-output.log | tail -1 || echo "0")
          FUZZ_EXIT=$(cat /tmp/fuzz-exit-code 2>/dev/null || echo "1")

          if [[ "$FUZZ_EXIT" -ne 0 && "$FAIL_COUNT" -eq 0 && "$UNSTABLE_COUNT" -eq 0 ]]; then
            echo "⚠️ Fuzz script exited with code $FUZZ_EXIT but no divergences reported — possible infrastructure failure" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "$FAIL_COUNT" -gt 0 || "$UNSTABLE_COUNT" -gt 0 || "$FUZZ_EXIT" -ne 0 ]]; then
            echo "has_divergences=true" >> "$GITHUB_OUTPUT"
            echo "fail_count=$FAIL_COUNT" >> "$GITHUB_OUTPUT"
            echo "unstable_count=$UNSTABLE_COUNT" >> "$GITHUB_OUTPUT"
          else
            echo "has_divergences=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package divergences
        if: steps.evaluate.outputs.has_divergences == 'true'
        run: |
          cd /tmp/diff-fuzz-nightly
          tar czf /tmp/diff-fuzz-divergences.tar.gz \
            divergence_*/ unstable_*/ 2>/dev/null || true

      - name: Upload divergences
        if: steps.evaluate.outputs.has_divergences == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: diff-fuzz-divergences-${{ github.run_number }}
          path: /tmp/diff-fuzz-divergences.tar.gz
          retention-days: 14

      - name: Open issue on divergence
        if: steps.evaluate.outputs.has_divergences == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FAIL_COUNT="${{ steps.evaluate.outputs.fail_count }}"
          UNSTABLE_COUNT="${{ steps.evaluate.outputs.unstable_count }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ARTIFACT_URL="${RUN_URL}#artifacts"

          gh issue create \
            --title "Nightly diff-fuzz: ${FAIL_COUNT} failures, ${UNSTABLE_COUNT} unstable ($(date -u +%Y-%m-%d))" \
            --label "bug,fuzz" \
            --body "$(cat <<EOF
          ## Nightly Differential Fuzz Divergence

          | | |
          |---|---|
          | **Run** | ${RUN_URL} |
          | **Date** | $(date -u +%Y-%m-%d) |
          | **Failures** | ${FAIL_COUNT} |
          | **Unstable** | ${UNSTABLE_COUNT} |
          | **Artifact** | [diff-fuzz-divergences-${{ github.run_number }}](${ARTIFACT_URL}) |

          ### Reproduce locally

          1. Download and extract the artifact:
             \`\`\`bash
             # Download from: ${ARTIFACT_URL}
             tar xzf diff-fuzz-divergences.tar.gz
             cd divergence_NNNNNN/  # pick a case
             \`\`\`

          2. Run each engine on the case:
             \`\`\`bash
             # Go
             cd pine-go && go run ./cmd/pineapple-run/ -config /path/to/config.json -request /path/to/request.json

             # Python
             cd pine-python && python -m pine.cli.run -config /path/to/config.json -request /path/to/request.json

             # Java
             cd pine-java && mvn -q exec:java -Dexec.mainClass="page.liam.pine.Main" -Dexec.args="-config /path/to/config.json -request /path/to/request.json"
             \`\`\`

          3. Compare outputs. Each case directory contains:
             - \`config.json\` — pipeline configuration
             - \`request.json\` — input request
             - \`info.txt\` — which engines diverged and their return codes
             - \`{go,python,java}_output.json\` — actual output from each engine

          ### Last 30 lines of fuzz output
          \`\`\`
          $(tail -30 diff-fuzz-output.log)
          \`\`\`
          EOF
          )"

      - name: Open issue on workflow failure
        if: failure() || cancelled()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh issue create \
            --title "Nightly diff-fuzz: workflow failed ($(date -u +%Y-%m-%d))" \
            --label "bug,infra" \
            --body "$(cat <<EOF
          ## Nightly Differential Fuzz Workflow Failure

          The nightly diff-fuzz workflow failed due to an infrastructure error
          (build failure, dependency issue, or script crash).

          | | |
          |---|---|
          | **Run** | ${RUN_URL} |
          | **Date** | $(date -u +%Y-%m-%d) |

          Check the [workflow logs](${RUN_URL}) for details.
          EOF
          )"
