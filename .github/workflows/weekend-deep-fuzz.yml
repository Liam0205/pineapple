name: Weekend Deep Differential Fuzz

# R3-X5: deeper statistical pass beyond the nightly 10k rounds. Runs
# every Saturday at midnight UTC with 100k rounds and no stability
# multiplier — meant to find rare divergences that the nightly missed.
# Shrinking is enabled so any divergence reduces to a minimal repro.

on:
  schedule:
    - cron: "0 0 * * 6"  # Saturday 00:00 UTC = Saturday 08:00 UTC+8
  workflow_dispatch:
    inputs:
      rounds:
        description: "Number of fuzz rounds"
        default: "100000"

jobs:
  weekend-fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: pine-go/go.mod
          cache-dependency-path: pine-go/go.sum

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install C++ build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++-13 libluajit-5.1-dev libcurl4-openssl-dev

      - name: Build Go binary
        run: go build -o pineapple-run ./cmd/pineapple-run/
        working-directory: pine-go

      - name: Install Python engine
        run: pip install -e ".[dev]"
        working-directory: pine-python

      - name: Build Java engine
        run: mvn package -B -q -DskipTests
        working-directory: pine-java

      - name: Build C++ engine
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++-13
          cmake --build build --target pineapple-run
        working-directory: pine-cpp

      - name: Run weekend deep fuzz
        timeout-minutes: 355
        run: |
          python3 scripts/differential-fuzz.py \
            --rounds ${{ inputs.rounds || '100000' }} \
            --stability-runs 0 \
            --shrink \
            --go-bin pine-go/pineapple-run \
            --cpp-bin pine-cpp/build/pineapple-run \
            --engines go,python,java,cpp \
            --save-dir /tmp/diff-fuzz-weekend \
            2>&1 | tee diff-fuzz-output.log || true

      - name: Evaluate results
        if: always()
        id: evaluate
        run: |
          echo "### Weekend Deep Fuzz Status" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          tail -30 diff-fuzz-output.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          FAIL_COUNT=$(grep -oP 'FAIL: \K[0-9]+' diff-fuzz-output.log | tail -1 || echo "0")
          if [[ "$FAIL_COUNT" -gt 0 ]]; then
            echo "has_divergences=true" >> "$GITHUB_OUTPUT"
            echo "fail_count=$FAIL_COUNT" >> "$GITHUB_OUTPUT"
          else
            echo "has_divergences=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package divergences
        if: steps.evaluate.outputs.has_divergences == 'true'
        run: |
          cd /tmp/diff-fuzz-weekend
          tar czf /tmp/diff-fuzz-divergences.tar.gz \
            divergence_*/ 2>/dev/null || true

      - name: Upload divergences
        if: steps.evaluate.outputs.has_divergences == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: weekend-fuzz-divergences-${{ github.run_number }}
          path: /tmp/diff-fuzz-divergences.tar.gz
          retention-days: 30
