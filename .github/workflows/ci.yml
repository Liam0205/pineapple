name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
    paths-ignore:
      - ".claude/**"
      - ".githooks/**"
      - ".github/workflows/agentic-*.yml"
      - "apple_generated/**"
      - "blog/**"
      - "doc/**"
      - "**/.gitignore"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "LICENSE"
      - "README.md"
  pull_request:
    paths-ignore:
      - ".claude/**"
      - ".githooks/**"
      - ".github/workflows/agentic-*.yml"
      - "apple_generated/**"
      - "blog/**"
      - "doc/**"
      - "**/.gitignore"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "LICENSE"
      - "README.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: ${{ github.ref_name != 'master' }}

jobs:
  go-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: pine-go/go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          working-directory: pine-go

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check apple/

  java-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pine-java
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven
      - run: mvn checkstyle:check -B

  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pine-go
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: pine-go/go.mod
      - run: go test -coverprofile=coverage.out -covermode=atomic ./...
      - name: Upload Go coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: go-coverage
          path: pine-go/coverage.out
          retention-days: 30

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: pine-go/go.mod
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install pytest pytest-cov
      - run: python -m pytest apple/tests/ -v --cov=apple --cov-report=term --cov-report=xml:coverage.xml
      - name: Upload Python coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: python-coverage
          path: coverage.xml
          retention-days: 30

  java-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pine-java
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven
      - run: mvn test -B -q
      - name: Upload Java coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: java-coverage
          path: pine-java/target/site/jacoco/
          retention-days: 30

  java-benchmark:
    runs-on: ubuntu-latest
    needs: java-test
    defaults:
      run:
        working-directory: pine-java
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
      - name: Run benchmarks
        run: mvn test -B -Dtest=BenchmarkTest -pl . 2>&1 | tee benchmark-java.txt
      - name: Write benchmark summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Pine-Java Benchmark results"
            echo
            echo '```text'
            grep -A 100 "=== Pine-Java Pipeline Benchmark ===" benchmark-java.txt || echo "No benchmark output"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  java-fuzz:
    runs-on: ubuntu-latest
    needs: java-test
    defaults:
      run:
        working-directory: pine-java
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven
      - name: Fuzz Config.load
        run: mvn test -B -Dtest="JazzerFuzzTest#fuzzConfigLoad" -Djazzer.instrument="page.liam.pine.**"
        env:
          JAZZER_FUZZ: "1"
      - name: Fuzz DAG.build
        run: mvn test -B -Dtest="JazzerFuzzTest#fuzzDAGBuild" -Djazzer.instrument="page.liam.pine.**"
        env:
          JAZZER_FUZZ: "1"
      - name: Fuzz Engine.create
        run: mvn test -B -Dtest="JazzerFuzzTest#fuzzEngineCreate" -Djazzer.instrument="page.liam.pine.**"
        env:
          JAZZER_FUZZ: "1"

  cross-validation:
    runs-on: ubuntu-latest
    needs: [go-test, java-test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: pine-go/go.mod
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Cross-validate Go vs Java
        run: bash scripts/cross-validate.sh
      - name: Write summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Cross-Validation Summary"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| Codegen schema parity | ✅ |"
            echo "| Render-DAG parity | ✅ |"
            echo "| Execution parity | ✅ |"
          } >> "$GITHUB_STEP_SUMMARY"

  codegen-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pine-go
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: pine-go/go.mod
      - name: Run codegen
        run: go run ./cmd/pineapple-codegen -output ../apple_generated -doc-dir ../doc/operators -operators-dir operators
      - name: Check no diff
        run: git diff --exit-code

  fuzz:
    runs-on: ubuntu-latest
    needs: go-test
    defaults:
      run:
        working-directory: pine-go
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: pine-go/go.mod
      - name: Fuzz config.Load
        run: go test -run=^$ -fuzz=FuzzLoad -fuzztime=30s -parallel=4 ./internal/config/
      - name: Fuzz dag.Build
        run: go test -run=^$ -fuzz=FuzzBuild -fuzztime=30s -parallel=4 ./internal/dag/
      - name: Fuzz DataFrame ApplyOutput
        run: go test -run=^$ -fuzz=FuzzApplyOutputStorageEquivalence -fuzztime=30s -parallel=4 ./internal/dataframe/
      - name: Fuzz data_parallel equivalence
        run: go test -run=^$ -fuzz=FuzzDataParallelEquivalence -fuzztime=30s -parallel=4 ./internal/runtime/

  benchmark:
    runs-on: ubuntu-latest
    needs: go-test
    defaults:
      run:
        working-directory: pine-go
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: pine-go/go.mod
      - name: Run benchmarks
        shell: bash
        run: |
          set -o pipefail
          go test -bench=. -benchmem -count=1 -run=^$ ./benchmarks/ ./integration/ | tee benchmark.txt
      - name: Write benchmark summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Benchmark results"
            echo
            echo '```text'
            if [ -s benchmark.txt ]; then
              cat benchmark.txt
            else
              echo "Benchmark output was not generated."
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: benchmark-results
          path: pine-go/benchmark.txt
          retention-days: 30
