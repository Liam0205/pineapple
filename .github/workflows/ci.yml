name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
    paths-ignore:
      - ".claude/**"
      - ".githooks/**"
      - ".github/workflows/agentic-*.yml"
      - "apple_generated/**"
      - "blog/**"
      - "doc/**"
      - "**/.gitignore"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "LICENSE"
      - "README.md"
  pull_request:
    paths-ignore:
      - ".claude/**"
      - ".githooks/**"
      - ".github/workflows/agentic-*.yml"
      - "apple_generated/**"
      - "blog/**"
      - "doc/**"
      - "**/.gitignore"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "LICENSE"
      - "README.md"

jobs:
  go-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check apple/

  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -coverprofile=coverage.out -covermode=atomic ./...
      - name: Upload Go coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: go-coverage
          path: coverage.out
          retention-days: 30

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install pytest pytest-cov
      - run: python -m pytest apple/tests/ -v --cov=apple --cov-report=term --cov-report=xml:coverage.xml
      - name: Upload Python coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: python-coverage
          path: coverage.xml
          retention-days: 30

  codegen-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run codegen
        run: go run ./cmd/pineapple-codegen -output apple_generated -doc-dir doc/operators -operators-dir operators
      - name: Check no diff
        run: git diff --exit-code

  fuzz:
    runs-on: ubuntu-latest
    needs: go-test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Fuzz config.Load
        run: go test -run=^$ -fuzz=FuzzLoad -fuzztime=30s -parallel=4 ./internal/config/
      - name: Fuzz dag.Build
        run: go test -run=^$ -fuzz=FuzzBuild -fuzztime=30s -parallel=4 ./internal/dag/
      - name: Fuzz DataFrame ApplyOutput
        run: go test -run=^$ -fuzz=FuzzApplyOutputStorageEquivalence -fuzztime=30s -parallel=4 ./internal/dataframe/
      - name: Fuzz data_parallel equivalence
        run: go test -run=^$ -fuzz=FuzzDataParallelEquivalence -fuzztime=30s -parallel=4 ./internal/runtime/

  benchmark:
    runs-on: ubuntu-latest
    needs: go-test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run benchmarks
        shell: bash
        run: |
          set -o pipefail
          go test -bench=. -benchmem -count=1 -run=^$ ./benchmarks/ ./integration/ | tee benchmark.txt
      - name: Write benchmark summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Benchmark results"
            echo
            echo '```text'
            if [ -s benchmark.txt ]; then
              cat benchmark.txt
            else
              echo "Benchmark output was not generated."
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: benchmark-results
          path: benchmark.txt
          retention-days: 30
